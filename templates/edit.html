<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Contact</title>

    <link rel="stylesheet" href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}">
    <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

    <style>
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
            font-family:Arial, Helvetica, sans-serif;
        }

        .card{
            width:100%;
            max-width:1100px;
            border:none;
            border-radius:20px;
            box-shadow:0 15px 45px rgba(0,0,0,.25);
            overflow:hidden;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            padding:30px;
            text-align:center;
        }

        .card-header h2{
            font-weight:bold;
            margin:0;
        }

        .card-body{
            padding:40px;
            background:white;
        }

        .form-control{
            border-radius:12px;
            padding:14px;
            border:1px solid #dcdcdc;
        }

        .form-control:focus{
            box-shadow:0 0 10px rgba(13,110,253,.25);
            border-color:#0d6efd;
        }

        label{
            font-weight:600;
            margin-bottom:8px;
        }

        textarea{
            resize:none;
        }

        .btn-update{
            background:#0d6efd;
            color:white;
            border:none;
            width:100%;
            padding:15px;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            transition:.3s;
        }

        .btn-update:hover{
            background:#084298;
            transform:translateY(-2px);
        }
    </style>
</head>

<body>

<div class="card">

    <div class="card-header">
        <h2>Edit Contact Information</h2>
        <p class="mb-0">Update the contact details below.</p>
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="row g-4">

                <div class="col-md-6">
                    <label for="name-field">Your Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="name-field"
                        name="name"
                        value="{{ editappointment.name }}"
                        required>
                </div>

                <div class="col-md-6">
                    <label for="email-field">Email Address</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email-field"
                        name="email"
                        value="{{ editappointment.email }}"
                        required>
                </div>

                <div class="col-12">
                    <label for="subject-field">Subject</label>
                    <input
                        type="text"
                        class="form-control"
                        id="subject-field"
                        name="subject"
                        value="{{ editappointment.subject }}"
                        required>
                </div>

                <div class="col-12">
                    <label for="message-field">Message</label>
                    <textarea
                        class="form-control"
                        id="message-field"
                        name="message"
                        rows="6"
                        required>{{ editappointment.message }}</textarea>
                </div>

                <div class="col-md-6">
                    <label for="datetime-field">Date & Time</label>
                    <input
                        type="datetime-local"
                        class="form-control"
                        id="datetime-field"
                        name="time"
                        value="{{ editappointment.time }}"
                        required>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" class="btn-update">
                        Update Contact
                    </button>
                </div>

            </div>

        </form>

    </div>

</div>

</body>
</html>
