<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Pesa Express Payment</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#00b14f,#007b3a);
            padding:20px;
        }

        .payment-card{
            width:100%;
            max-width:420px;
            background:#fff;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 20px 40px rgba(0,0,0,.25);
            animation:fadeIn .5s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .header{
            background:linear-gradient(135deg,#00b14f,#009245);
            color:white;
            text-align:center;
            padding:35px 25px;
        }

        .header .icon{
            font-size:60px;
            margin-bottom:10px;
        }

        .header h2{
            font-size:28px;
            margin-bottom:8px;
        }

        .header p{
            opacity:.9;
            font-size:15px;
        }

        .content{
            padding:30px;
        }

        .amount-card{
            background:#f4fff8;
            border:2px dashed #00b14f;
            border-radius:15px;
            text-align:center;
            padding:18px;
            margin-bottom:25px;
        }

        .amount-card small{
            color:#666;
            display:block;
            margin-bottom:5px;
        }

        .amount-card h1{
            color:#00b14f;
            font-size:38px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:14px 16px;
            border:2px solid #ddd;
            border-radius:12px;
            font-size:16px;
            transition:.3s;
            outline:none;
        }

        input:focus{
            border-color:#00b14f;
            box-shadow:0 0 0 4px rgba(0,177,79,.15);
        }

        input[readonly]{
            background:#f8f9fa;
            color:#555;
            font-weight:bold;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#00b14f,#009245);
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(0,177,79,.35);
        }

        button:active{
            transform:scale(.98);
        }

        .footer{
            margin-top:20px;
            text-align:center;
            color:#777;
            font-size:14px;
            line-height:1.5;
        }

        .secure{
            margin-top:15px;
            color:#00b14f;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="payment-card">

    <div class="header">
        <div class="icon">💳</div>
        <h2>M-Pesa Express</h2>
        <p>Fast, Secure & Convenient Payment</p>
    </div>

    <div class="content">

        <div class="amount-card">
            <small>Total Amount</small>
            <h1>KES 100</h1>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>📱 Phone Number</label>
                <input
                    type="text"
                    name="phone"
                    placeholder="254712345678"
                    required>
            </div>

            <div class="form-group">
                <label>💰 Amount</label>
                <input
                    type="number"
                    name="amount"
                    value="100"
                    readonly>
            </div>

            <button type="submit">
                Pay Now
            </button>

        </form>

        <div class="footer">
            Enter your Safaricom number and click
            <strong>Pay Now</strong>. An M-Pesa prompt will be sent to your phone.
            <div class="secure">🔒 Secure Payment</div>
        </div>

    </div>

</div>

</body>
</html>
